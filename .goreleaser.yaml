version: 2
before:
  hooks:
    - go mod tidy
    - cd web/frontend && npm install
    - cd web/frontend && npm run build

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: taskctl
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: taskctl
    homepage: https://github.com/name-isname/tasker
    repository:
      owner: name-isname
      name: homebrew-taskctl
      branch: main
    description: "Process-oriented task management system"
    license: MIT
    skip_upload: auto
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "Update taskctl to {{ .Version }}"
    install: |
      bin.install "taskctl"
    test: |
      system "#{bin}/taskctl", "version"

release:
  github:
    owner: name-isname
    name: tasker
